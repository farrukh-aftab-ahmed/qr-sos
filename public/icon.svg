<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <circle cx="16" cy="16" r="16" fill="#1C3C70"/>
  <!-- car roof arch (orange) -->
  <path d="M 6 15 Q 7 8 16 7 Q 25 8 26 15"
        stroke="#D45C12" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- left pillar -->
  <path d="M 6 15 L 5.5 20" stroke="#D45C12" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- right pillar -->
  <path d="M 26 15 L 26.5 20" stroke="#D45C12" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- QR text -->
  <text x="16" y="19" text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-size="9" fill="white">QR</text>
  <!-- SOS text -->
  <text x="16" y="27" text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-size="5.5" fill="white" letter-spacing="1">SOS</text>
</svg>
