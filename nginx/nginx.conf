user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main buffer=16k flush=2m;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/rss+xml application/atom+xml image/svg+xml;
    gzip_min_length 1000;

    # Brotli (if module available)
    # brotli on;
    # brotli_comp_level 6;

    # Cache
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=qrsos_cache:10m max_size=1g
                     inactive=60m use_temp_path=off;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=scan:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;

    # Upstream
    upstream qrsos_app {
        server app:3000;
        keepalive 32;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # Main HTTPS server
    server {
        listen 443 ssl http2;
        server_name qr-sos.online www.qr-sos.online;

        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://storage.googleapis.com; connect-src 'self' wss:; font-src 'self'; frame-ancestors 'none';" always;

        # Max upload 10MB
        client_max_body_size 10m;

        # Rate limiting on auth endpoints
        location /api/auth/register {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://qrsos_app;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://qrsos_app;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/scan/ {
            limit_req zone=scan burst=10 nodelay;
            proxy_pass http://qrsos_app;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://qrsos_app;
            include /etc/nginx/proxy_params.conf;
        }

        # Static assets — long cache
        location /_next/static/ {
            proxy_pass http://qrsos_app;
            proxy_cache qrsos_cache;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
            include /etc/nginx/proxy_params.conf;
        }

        # Service worker — no cache
        location /sw.js {
            proxy_pass http://qrsos_app;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            include /etc/nginx/proxy_params.conf;
        }

        # Everything else
        location / {
            proxy_pass http://qrsos_app;
            proxy_cache qrsos_cache;
            proxy_cache_valid 200 10m;
            proxy_cache_bypass $http_pragma $http_authorization $cookie_next-auth.session-token;
            proxy_no_cache $http_pragma $http_authorization $cookie_next-auth.session-token;
            include /etc/nginx/proxy_params.conf;
        }
    }
}
