version: '3.9'

# ── Usage ─────────────────────────────────────────────────────────────────────
#
#  Local dev (postgres + redis only):
#    docker compose --profile dev up -d
#
#  Production (full stack with nginx):
#    docker compose --profile prod up -d --build
#    docker exec qr-sos-app npx prisma migrate deploy
#
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: qr-sos-postgres
    profiles: [dev, prod]
    environment:
      POSTGRES_USER: qrsos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qrsos123}
      POSTGRES_DB: qrsos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qrsos -d qrsos"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - qr-sos-net

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: qr-sos-redis
    profiles: [dev, prod]
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - qr-sos-net

  # ── Next.js App (production only) ───────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_APP_NAME: QR-SOS
    container_name: qr-sos-app
    profiles: [prod]
    environment:
      DATABASE_URL: postgresql://qrsos:${POSTGRES_PASSWORD:-qrsos123}@postgres:5432/qrsos
      REDIS_URL: redis://redis:6379
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_APP_NAME: QR-SOS
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - qr-sos-net

  # ── Nginx reverse proxy (production only) ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: qr-sos-nginx
    profiles: [prod]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy_params.conf:/etc/nginx/proxy_params.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - qr-sos-net

volumes:
  postgres_data:
  redis_data:
  nginx_cache:

networks:
  qr-sos-net:
    driver: bridge
